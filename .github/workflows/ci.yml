name: Monorepo CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  # ==================================================
  # 🎨 CLIENT JOB (Next.js)
  # ==================================================
  client-check:
    name: Client (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # 👇 ВАЖЛИВО: Вказуємо на головний лок-файл у корені
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        # 👇 Встановлюємо залежності для ВСІХ проектів зразу (з кореня)
        run: npm ci

      - name: Lint Client
        # 👇 -w client означає: "Запусти npm run lint всередині папки client"
        run: npm run lint -w client

      - name: Build Client
        run: npm run build -w client

  # ==================================================
  # ⚙️ BACKEND JOB (NestJS)
  # ==================================================
  backend-check:
    name: Backend (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint Backend
        run: npm run lint -w back

      - name: Build Backend
        run: npm run build -w back