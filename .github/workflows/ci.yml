name: Monorepo CI

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main", "dev"]

jobs:
  # ==============================
  # 🎨 FRONTEND JOB (Next.js)
  # ==============================
  frontend-check:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # 👇 Важливо: вказуємо шлях до лок-файлу фронта для кешування
          cache-dependency-path: ./client/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Frontend
        run: npm run build

  # ==============================
  # ⚙️ BACKEND JOB (NestJS)
  # ==============================
  backend-check:
    name: Backend (Lint & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back  # 👈 Вказуємо папку бека

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # 👇 Вказуємо шлях до лок-файлу бека
          cache-dependency-path: ./back/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      # Для NestJS білд теж важливий, щоб перевірити чи немає помилок компіляції TS
      - name: Build Backend
        run: npm run build