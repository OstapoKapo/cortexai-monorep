name: Frontend CI

on:
  pull_request:
    branches: ["main", "develop"] # ✅ Виправив синтаксис масиву
  push:
    branches: ["main", "develop"]

jobs:
  check-quality:
    name: Check Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
      
      - name: Build Project
        run: npm run build