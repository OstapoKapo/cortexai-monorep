  # --- 2. Frontend (твій React/Next) ---
  # frontend:
  #   build:
  #     context: ./front # Вказуємо шлях до папки 'front'
  #   container_name: cortexai-frontend
  #   ports:
  #     - "3000:3000" # Порт для React/Next
  #   restart: always
  #   # Можна додати, якщо фронту потрібен бек під час збірки (зазвичай ні)
  #   # depends_on:
  #   #   - backend 

  # --- 3. База даних ---
  db:
    image: postgres:15-alpine
    container_name: cortexai-users-db # Унікальне ім'я
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cortexai-users-db # Назва БД для проекту
    volumes:
      - pgdata-cortexai-users:/var/lib/postgresql/data # Унікальний том

  # --- 4. Редіс ---
  redis:
    image: redis:7
    container_name: cortexai-redis # Унікальне ім'я
    ports:
      - "6379:6379"
    restart: always
    
  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME-localstack_main}"
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"            # Це головний вхід (Gateway)
      - "127.0.0.1:4510-4559:4510-4559"  # Порти для сервісів
    environment:
      - DEBUG=${DEBUG-}
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

# Оголошуємо унікальний том для даних БД
volumes:
  pgdata-cortexai-users: