name: Monorepo CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  client-check:
    name: Client (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint Client
        # 👇 -w client означає: "Запусти npm run lint всередині папки client"
        run: npm run lint -w client

      - name: Build Client
        run: npm run build -w client

 
  auth-check:
    name: auth (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Shared Library
        run: npm run build -w @cortex/shared
      
      - name: Build Backend Common
        run: npm run build -w @cortex/backend-common

      - name: Lint Backend
        run: npm run lint -w auth

      - name: Build Backend
        run: npm run build -w auth

  report-service-check:
    name: Report Service (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        run: npm ci


      - name: Build Shared Library
        run: npm run build -w @cortex/shared
      
      - name: Build Backend Common
        run: npm run build -w @cortex/backend-common

      - name: Lint Backend
        run: npm run lint -w report-service

      - name: Build Backend
        run: npm run build -w report-service

  gateway-check:
    name: Gateway (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Shared Library
        run: npm run build -w @cortex/shared
      
      - name: Build Backend Common
        run: npm run build -w @cortex/backend-common

      - name: Lint Backend
        run: npm run lint -w gateway

      - name: Build Backend
        run: npm run build -w gateway